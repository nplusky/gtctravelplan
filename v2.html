</head>

                { en: "Shoji", zh: "莊司料理", city: "SJ", tag: "restaurant", desc: "聖荷西在地優質餐飲" },

                { en: "The Buena Vista", zh: "愛爾蘭咖啡", city: "SF", tag: "restaurant", desc: "愛爾蘭咖啡發源地" },

                { en: "Tony’s Pizza Napoletana", zh: "東尼比薩", city: "SF", tag: "restaurant", desc: "比薩冠軍坐鎮" }
            ], []);

            // 行程數據
            const [itinerary, setItinerary] = useState([
                { date: '3/13', dayName: 'Fri', events: [{ id: 1, time: '19:40', location: 'SFO Airport', note: '抵達舊金山國際機場並取車。', type: 'transport' }]},

                    { id: 4, time: '13:00', location: 'Pier 39 & Fisherman’s Wharf', note: '欣賞海獅與漁人碼頭風光。', type: 'sight' },

                { date: '3/15', dayName: 'Sun', events: [
                    { id: 7, time: '09:30', location: 'Portsmouth Square', note: '花園角廣場漫步並享用早餐。', type: 'food' },

                    { id: 12, time: '19:00', location: 'Costco Wholesale San Francisco', note: '前往賣場採買生活物資。', type: 'shopping' }
                ]},
                { date: '3/16', dayName: 'Mon', events: [
                    { id: 13, time: '08:00', location: 'SAP Center San Jose', note: '抵達場館進行大會報到。', type: 'work' },

                ]},
                { date: '3/17', dayName: 'Tue', events: [{ id: 16, time: '06:00', location: 'Yosemite National Park', note: '一整天的優勝美地國家公園之旅。', type: 'nature' }]},
                { date: '3/18', dayName: 'Wed', events: [{ id: 17, time: '16:00', location: 'San Jose Convention Center GTC', note: '參加下午的 GTC 大會議程。', type: 'work' }]},
                { date: '3/19', dayName: 'Thu', events: [

            ]);

            // 天氣 API
            useEffect(() => {
                const locations = [
                    { name: '舊金山', en: 'San Francisco', lat: 37.77, lon: -122.41 },
                    { name: '聖荷西', en: 'San Jose', lat: 37.33, lon: -121.88 },
                    { name: 'UC Berkeley', en: 'UC Berkeley', lat: 37.87, lon: -122.27 },
                    { name: '優勝美地', en: 'Yosemite', lat: 37.75, lon: -119.59 }
                ];

                const fetchAllWeather = async () => {
                    setWeatherLoading(true);
                    const results = {};
                    try {
                        for (const loc of locations) {
                            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=America%2FLos_Angeles`);
                            const data = await res.json();
                            results[loc.en] = data.daily;
                        }
                        setWeatherData(results);
                    } catch (err) { console.error("Weather fetch error", err); }
                    setWeatherLoading(false);
                };
                fetchAllWeather();
            }, []);

            const getWeatherIcon = (code) => {
                if (code <= 1) return "sun";
                if (code <= 3) return "cloud";
                if (code <= 67) return "cloud-rain";
                if (code <= 77) return "cloud-snow";
                return "cloud-lightning";
            };

            const addEventToItinerary = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const dayIndex = parseInt(formData.get('dayIndex'));
                const newEvent = {
                    id: Date.now(),
                    time: formData.get('time') || '12:00',
                    location: formData.get('location'),
                    note: formData.get('note'),
                    type: 'manual'
                };
                const updatedItinerary = [...itinerary];
                updatedItinerary[dayIndex].events.push(newEvent);
                updatedItinerary[dayIndex].events.sort((a, b) => a.time.localeCompare(b.time));
                setItinerary(updatedItinerary);
                setIsAdding(false);
                setItemToAdd(null);
                setModalView('list');
                setSelectedDay(dayIndex);
            };

            const currentDayData = itinerary[selectedDay];

            return (

                                            <p className="text-[10px] text-slate-400 leading-relaxed italic">{event.note}</p>

                                        </div>
                                    ))}

                                                            <span className="text-xs font-black">{Math.round(weatherData[loc.en].temperature_2m_max[idx])}°</span>
                                                            <span className="text-[8px] opacity-60 font-bold">{Math.round(weatherData[loc.en].temperature_2m_min[idx])}°</span>

                                <div className="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-6">
                                    <Icon name="map" className="w-12 h-12 text-blue-500" />
                                </div>
                                <h2 className="text-2xl font-black mb-4 uppercase text-blue-600 italic">Navigation</h2>
                                <button onClick={() => window.open('https://www.google.com/maps/search/San+Francisco+and+San+Jose+Attractions', '_blank')} className="w-full bg-blue-600 text-white py-4 rounded-3xl font-black text-sm shadow-xl flex items-center justify-center gap-3">
                                    <Icon name="globe" className="w-5 h-5" /> FULL MAP VIEW
                                </button>
                            </div>
                        )}
                    </main>

                    {/* Unified Add Modal */}
                    {isAdding && (
                        <div className="fixed inset-0 z-[60] flex items-end justify-center px-4 pb-10">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setIsAdding(false)}></div>
                            <div className="relative w-full max-w-sm bg-white rounded-[3rem] p-8 shadow-2xl animate-in slide-in-from-bottom duration-300 flex flex-col max-h-[85vh]">
                                {modalView === 'list' ? (
                                    <>
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-xl font-black text-slate-800 uppercase italic">快速加入項目</h3>
                                            <button onClick={() => setModalView('form')} className="text-blue-600 text-xs font-black uppercase tracking-widest border-b-2 border-blue-600">手動輸入</button>
                                        </div>
                                        <div className="flex bg-slate-100 p-1 rounded-2xl mb-4">
                                            <button onClick={() => setAddType('attractions')} className={`flex-1 py-2 rounded-xl text-[10px] font-black transition-all ${addType === 'attractions' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-400'}`}>SIGHTS</button>
                                            <button onClick={() => setAddType('restaurants')} className={`flex-1 py-2 rounded-xl text-[10px] font-black transition-all ${addType === 'restaurants' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-400'}`}>FOOD</button>
                                        </div>
                                        <div className="overflow-y-auto no-scrollbar space-y-3 flex-1 pb-4">
                                            {(addType === 'attractions' ? attractions : restaurants).map((item, idx) => (
                                                <div key={idx} onClick={() => {setItemToAdd(item); setModalView('form');}} className="p-4 bg-slate-50 rounded-2xl border border-transparent hover:border-blue-100 active:bg-white transition-all cursor-pointer group">
                                                    <div className="flex justify-between items-start">
                                                        <div>
                                                            <div className="font-black text-slate-800 text-sm">{item.en}</div>
                                                            <div className="text-[10px] text-slate-400 font-bold">{item.zh} · {item.city}</div>
                                                        </div>
                                                        <div className="w-6 h-6 rounded-full bg-white flex items-center justify-center text-blue-600 shadow-sm opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <Icon name="plus" className="w-3 h-3" />
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => setIsAdding(false)} className="mt-4 w-full py-4 bg-slate-100 text-slate-400 rounded-2xl font-black text-xs uppercase">取消</button>
                                    </>
                                ) : (
                                    <form onSubmit={addEventToItinerary} className="flex flex-col">
                                        <h3 className="text-xl font-black mb-6 text-slate-800 uppercase italic">{itemToAdd ? `加入: ${itemToAdd.en}` : '手動新增項目'}</h3>
                                        <input type="hidden" name="location" defaultValue={itemToAdd ? itemToAdd.en : ''} />
                                        <div className="space-y-4 mb-8 overflow-y-auto no-scrollbar max-h-[50vh]">
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 mb-2 block uppercase">Select Day</label>
                                                <select name="dayIndex" defaultValue={selectedDay} className="w-full bg-slate-50 border-none rounded-2xl px-4 py-3 font-bold">
                                                    {itinerary.map((day, idx) => <option key={idx} value={idx}>{day.date} ({day.dayName})</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 mb-2 block uppercase">Time</label>
                                                <input required name="time" type="time" defaultValue="12:00" className="w-full bg-slate-50 border-none rounded-2xl px-4 py-3 font-bold" />
                                            </div>
                                            {!itemToAdd && (
                                                <div>
                                                    <label className="text-[10px] font-black text-slate-400 mb-2 block uppercase">Location Name</label>
                                                    <input required name="location" type="text" placeholder="e.g., Apple Park" className="w-full bg-slate-50 border-none rounded-2xl px-4 py-3 font-bold" />
                                                </div>
                                            )}
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 mb-2 block uppercase">Note (Chinese)</label>
                                                <textarea name="note" defaultValue={itemToAdd ? itemToAdd.zh : ''} placeholder="簡短中文說明..." className="w-full bg-slate-50 border-none rounded-2xl px-4 py-3 font-bold h-20 resize-none"></textarea>
                                            </div>
                                        </div>
                                        <div className="flex gap-3">
                                            <button type="button" onClick={() => {setModalView('list'); setItemToAdd(null);}} className="flex-1 py-4 bg-slate-100 text-slate-400 rounded-2xl font-black text-xs uppercase">返回</button>
                                            <button type="submit" className="flex-[2] py-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-lg shadow-blue-200">確定加入</button>
                                        </div>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-xl border-t border-slate-100 px-8 py-5 flex justify-around rounded-t-[2.5rem] shadow-2xl z-50 safe-bottom">
                        <button onClick={() => setActiveTab('itinerary')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'itinerary' ? 'text-blue-600 scale-110' : 'text-slate-300'}`}>
                            <Icon name="calendar" /><span className="text-[8px] font-black uppercase tracking-widest">Plan</span>
                        </button>
                        <button onClick={() => setActiveTab('weather')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'weather' ? 'text-blue-600 scale-110' : 'text-slate-300'}`}>
                            <Icon name="cloud" /><span className="text-[8px] font-black uppercase tracking-widest">Weather</span>
                        </button>
                        <button onClick={() => setActiveTab('map')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'map' ? 'text-blue-600 scale-110' : 'text-slate-300'}`}>
                            <Icon name="map" /><span className="text-[8px] font-black uppercase tracking-widest">Maps</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
